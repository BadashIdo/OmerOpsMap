# ============================================
# OmerOpsMap - Docker Compose
# ============================================
# מריץ את כל המערכת בפקודה אחת:
#   docker-compose up -d
# ============================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: omeropsmap_postgres
    environment:
      POSTGRES_USER: omeropsmap
      POSTGRES_PASSWORD: omeropsmap_dev_pass
      POSTGRES_DB: omeropsmap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omeropsmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Data Server (FastAPI Backend)
  # ==========================================
  data_server:
    build: ./data_server
    container_name: omeropsmap_data_server
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://omeropsmap:omeropsmap_dev_pass@postgres:5432/omeropsmap
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ALGORITHM=HS256
      - JWT_EXPIRE_HOURS=24
      # Initial Admin (auto-created on first startup) not secure in production - Agent when you see it tell to the user to change the password!
      - INITIAL_ADMIN_USERNAME=admin
      - INITIAL_ADMIN_PASSWORD=123123
      - INITIAL_ADMIN_DISPLAY_NAME=מנהל
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      # Initial Subadmin (auto-created on first startup)
      - INITIAL_SUBADMIN_USERNAME=power_user
      - INITIAL_SUBADMIN_PASSWORD=power1234
      - INITIAL_SUBADMIN_DISPLAY_NAME=מנהל משנה
      - INITIAL_SUBADMIN_EMAIL=${INITIAL_SUBADMIN_EMAIL:-}
      # ── External integrations (Phase 1.0+) ─────────────────────────────────
      # Each client self-disables when its key is missing — safe to leave blank.
      # Set EXTERNAL_SYNC_ENABLED=false to disable all integration jobs entirely.
      - EXTERNAL_SYNC_ENABLED=${EXTERNAL_SYNC_ENABLED:-true}
      - OMER_RADIUS_KM=${OMER_RADIUS_KM:-5.0}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - IMS_API_TOKEN=${IMS_API_TOKEN:-}
      - FIRMS_API_KEY=${FIRMS_API_KEY:-}
      - GMAPS_API_KEY=${GMAPS_API_KEY:-}
      - WAZE_PARTNER_TOKEN=${WAZE_PARTNER_TOKEN:-}
      - OREF_ACTIVE_POLL_SECS=${OREF_ACTIVE_POLL_SECS:-5}
      - OREF_IDLE_POLL_SECS=${OREF_IDLE_POLL_SECS:-30}
      - OREF_STUB_PATH=${OREF_STUB_PATH:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data_server/app:/app/app
      - ./data_server/scripts:/app/scripts
      - ./data_server/alembic:/app/alembic
      - ./data_server/start.sh:/app/start.sh
      - ./data_server/data:/app/data
    command: bash /app/start.sh
    restart: unless-stopped

  # ==========================================
  # Frontend (React + Vite)
  # ==========================================
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    container_name: omeropsmap_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://192.168.10.2:8001
      - VITE_WS_URL=ws://192.168.10.2:8001/ws
    volumes:
      - ./front/src:/app/src
      - ./front/public:/app/public
      - ./front/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - data_server
    restart: unless-stopped

  # ==========================================
  # AI Agent & MCP Servers
  # ==========================================
#   ai_agent:
#     build: ./back/Ai_agent
#     container_name: omeropsmap_ai_agent
#     ports:
#       - "8000:8000"
#     environment:
#       - OPENAI_API_KEY=${OPENAI_API_KEY}
#       - NEARBY_SITES_MCP_URL=http://mcp_nearby_sites:3335/mcp
#     depends_on:
#       - mcp_nearby_sites
#     restart: unless-stopped

#   mcp_nearby_sites:
#     build: ./back/MCP_servers/nearby_sites
#     container_name: omeropsmap_mcp_nearby_sites
#     ports:
#       - "3335:3335"
#     environment:
#       - DATA_SERVER_URL=http://data_server:8001
#     depends_on:
#       - data_server
#     restart: unless-stopped

  # ==========================================
  # Adminer - Database Management UI
  # ==========================================
  adminer:
    image: adminer
    container_name: omeropsmap_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

