# ============================================
# OmerOpsMap - PRODUCTION Docker Compose
# ============================================
# מריץ את כל המערכת בסביבת פרודקשן על שרת (VPS):
#   docker-compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # ==========================================
  # Nginx - Reverse Proxy with SSL/TLS
  # ==========================================
  nginx:
    image: 'nginx:latest'
    container_name: omeropsmap_nginx
    ports:
      - '80:80'      # HTTP traffic (redirect to HTTPS)
      - '443:443'    # HTTPS traffic (Public)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - proxy-tier
    depends_on:
      - frontend
      - data_server
    restart: unless-stopped

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: omeropsmap_postgres
    environment:
      POSTGRES_USER: omeropsmap
      POSTGRES_PASSWORD: omeropsmap_prod_pass # CHANGE THIS
      POSTGRES_DB: omeropsmap
    # הסרנו את החשיפה של פורט 5432 החוצה (כדי שלא יהיה ניתן לפרוץ למסד הנתונים מרחוק)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omeropsmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy-tier
    restart: unless-stopped

  # ==========================================
  # Data Server (FastAPI Backend)
  # ==========================================
  data_server:
    build: ./data_server
    container_name: omeropsmap_data_server
    # פורט 8001 לא נחשף החוצה. NPM ידבר איתו ברשת הפנימית
    environment:
      - DATABASE_URL=postgresql+asyncpg://omeropsmap:omeropsmap_prod_pass@postgres:5432/omeropsmap
      - SECRET_KEY=${SECRET_KEY:-generate-a-very-secure-secret-key}
      - ALGORITHM=HS256
      - JWT_EXPIRE_HOURS=24
      - INITIAL_ADMIN_USERNAME=admin
      - INITIAL_ADMIN_PASSWORD=123123 # פיילוט בלבד
      - INITIAL_ADMIN_DISPLAY_NAME=מנהל
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data_server/app:/app/app
      - ./data_server/scripts:/app/scripts
      - ./data_server/alembic:/app/alembic
      - ./data_server/start.sh:/app/start.sh
      - ./data_server/data:/app/data
    command: bash /app/start.sh
    networks:
      - proxy-tier
    restart: unless-stopped

  # ==========================================
  # Frontend (React + Vite)
  # ==========================================
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://165.245.218.35}
        - VITE_WS_URL=${VITE_WS_URL:-wss://165.245.218.35/ws}
    container_name: omeropsmap_frontend
    # השירות הזה רץ על פורט 80 (מבוסס Nginx פנימי), ה-NPM יתחבר אליו לשם
    volumes:
      - ./front/src:/app/src
      - ./front/public:/app/public
      - ./front/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - data_server
    networks:
      - proxy-tier
    restart: unless-stopped

networks:
  proxy-tier:
    external: false

volumes:
  postgres_data:
