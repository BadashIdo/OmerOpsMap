# ============================================
# OmerOpsMap - PRODUCTION Docker Compose
# ============================================
# מריץ את כל המערכת בסביבת פרודקשן על שרת (VPS):
#   docker-compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # ==========================================
  # Nginx - Reverse Proxy with SSL/TLS
  # ==========================================
  nginx:
    image: 'nginx:latest'
    container_name: omeropsmap_nginx
    ports:
      - '80:80'      # HTTP traffic (redirect to HTTPS)
      - '443:443'    # HTTPS traffic (Public)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - proxy-tier
    depends_on:
      - frontend
      - data_server
      - ai_agent
    restart: unless-stopped

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: omeropsmap_postgres
    environment:
      POSTGRES_USER: omeropsmap
      # MUST be set in .env in production. No default — container fails fast
      # if this is missing, surfacing the misconfiguration before any data is
      # written under a guessable password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: omeropsmap
    # הסרנו את החשיפה של פורט 5432 החוצה (כדי שלא יהיה ניתן לפרוץ למסד הנתונים מרחוק)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omeropsmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy-tier
    restart: unless-stopped

  # ==========================================
  # Data Server (FastAPI Backend)
  # ==========================================
  data_server:
    build: ./data_server
    container_name: omeropsmap_data_server
    # פורט 8001 לא נחשף החוצה. NPM ידבר איתו ברשת הפנימית
    environment:
      - DATABASE_URL=postgresql+asyncpg://omeropsmap:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/omeropsmap
      # SECRET_KEY MUST be a long random string. Container will fail to start
      # if you forget to set it — that is intentional. Generate one with:
      #   python -c 'import secrets; print(secrets.token_urlsafe(64))'
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env (long random string)}
      - ALGORITHM=HS256
      - JWT_EXPIRE_HOURS=24
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      # INITIAL_ADMIN_PASSWORD MUST be set in .env — no insecure default in prod.
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD must be set in .env}
      - INITIAL_ADMIN_DISPLAY_NAME=${INITIAL_ADMIN_DISPLAY_NAME:-מנהל}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_SUBADMIN_USERNAME=${INITIAL_SUBADMIN_USERNAME:-power_user}
      - INITIAL_SUBADMIN_PASSWORD=${INITIAL_SUBADMIN_PASSWORD:?INITIAL_SUBADMIN_PASSWORD must be set in .env}
      - INITIAL_SUBADMIN_DISPLAY_NAME=${INITIAL_SUBADMIN_DISPLAY_NAME:-מנהל משנה}
      - INITIAL_SUBADMIN_EMAIL=${INITIAL_SUBADMIN_EMAIL:-}
      # ── External integrations (Phase 1.0+) ─────────────────────────────────
      # Provide keys via the host's .env file or your orchestration's secrets
      # store (GCP Secret Manager, DO App Platform encrypted env, etc).
      # Each client self-disables when its key is missing.
      - EXTERNAL_SYNC_ENABLED=${EXTERNAL_SYNC_ENABLED:-true}
      - OMER_RADIUS_KM=${OMER_RADIUS_KM:-5.0}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - IMS_API_TOKEN=${IMS_API_TOKEN:-}
      - FIRMS_API_KEY=${FIRMS_API_KEY:-}
      - GMAPS_API_KEY=${GMAPS_API_KEY:-}
      - WAZE_PARTNER_TOKEN=${WAZE_PARTNER_TOKEN:-}
      - OREF_ACTIVE_POLL_SECS=${OREF_ACTIVE_POLL_SECS:-5}
      - OREF_IDLE_POLL_SECS=${OREF_IDLE_POLL_SECS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data_server/app:/app/app
      - ./data_server/scripts:/app/scripts
      - ./data_server/alembic:/app/alembic
      - ./data_server/start.sh:/app/start.sh
      - ./data_server/data:/app/data
    command: bash /app/start.sh
    networks:
      - proxy-tier
    restart: unless-stopped
    healthcheck:
      # Python is always available in this image; curl is not. Use httpx
      # (already a dep) to hit /health and exit non-zero on failure.
      test: ["CMD-SHELL", "python -c 'import httpx,sys; r=httpx.get(\"http://localhost:8001/health\",timeout=3); sys.exit(0 if r.status_code==200 else 1)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================
  # Frontend (React + Vite)
  # ==========================================
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://165.245.218.35}
        - VITE_WS_URL=${VITE_WS_URL:-wss://165.245.218.35/ws}
        - VITE_AI_AGENT_URL=${VITE_AI_AGENT_URL:-https://165.245.218.35/ai}
    container_name: omeropsmap_frontend
    # השירות הזה רץ על פורט 80 (מבוסס Nginx פנימי), ה-NPM יתחבר אליו לשם
    volumes:
      - ./front/src:/app/src
      - ./front/public:/app/public
      - ./front/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - data_server
    networks:
      - proxy-tier
    restart: unless-stopped

  # ==========================================
  # MCP nearby_sites — feeds real site data to the AI agent
  # ==========================================
  mcp_nearby_sites:
    build: ./back/MCP_servers/nearby_sites
    container_name: omeropsmap_mcp_nearby_sites
    environment:
      # Internal Docker DNS — data_server is not exposed to the host in prod
      - DATA_SERVER_URL=http://data_server:8001
    depends_on:
      data_server:
        condition: service_healthy
    networks:
      - proxy-tier
    restart: unless-stopped

  # ==========================================
  # AI Agent — answers citizen queries via /ask
  # Reached through Nginx at /ai/* — no host port exposed.
  # ==========================================
  ai_agent:
    build: ./back/Ai_agent
    container_name: omeropsmap_ai_agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY must be set in .env}
      # Internal Docker DNS — not localhost
      - NEARBY_SITES_MCP_URL=http://mcp_nearby_sites:3335/mcp
      # LangSmith tracing (optional — leave empty to disable)
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-OmerOpsMap}
    depends_on:
      - mcp_nearby_sites
    networks:
      - proxy-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx,sys; r=httpx.get(\"http://localhost:8000/health\",timeout=3); sys.exit(0 if r.status_code==200 else 1)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy-tier:
    external: false

volumes:
  postgres_data:
