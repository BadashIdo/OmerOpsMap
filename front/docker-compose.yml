version: '3.8'

# Standalone Docker Compose for Frontend only
# Useful for frontend development when backend is running separately

services:
  frontend_dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: omeropsmap_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      # Hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      # Prevent overwriting node_modules
      - /app/node_modules
    environment:
      # Point to backend on localhost (from browser perspective)
      # Browser runs on host machine, not inside Docker!
      - VITE_API_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8001/ws
    restart: unless-stopped
    networks:
      - frontend_network

networks:
  frontend_network:
    driver: bridge

